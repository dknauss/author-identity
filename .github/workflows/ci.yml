name: CI

on:
  push:
    branches: [main]
    paths:
      - 'byline-feed/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'byline-feed/**'
      - '.github/workflows/ci.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  phpunit:
    name: PHPUnit — PHP ${{ matrix.php }} / WP ${{ matrix.wp }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: byline-feed

    strategy:
      fail-fast: false
      matrix:
        include:
          # PHP 7.4
          - php: '7.4'
            wp: '6.0'
          - php: '7.4'
            wp: 'latest'
          # PHP 8.0
          - php: '8.0'
            wp: '6.0'
          - php: '8.0'
            wp: 'latest'
          # PHP 8.1
          - php: '8.1'
            wp: '6.4'
          - php: '8.1'
            wp: 'latest'
          # PHP 8.2
          - php: '8.2'
            wp: '6.4'
          - php: '8.2'
            wp: 'latest'
          # PHP 8.3
          - php: '8.3'
            wp: 'latest'

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, mysql, mysqli, pdo_mysql, bcmath, soap, intl, gd, exif, iconv
          coverage: none

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress

      - name: Install Subversion
        run: sudo apt-get update && sudo apt-get install -y subversion

      - name: Install WordPress test suite
        run: bash bin/install-wp-tests.sh wordpress_test root root 127.0.0.1 ${{ matrix.wp }} true
        env:
          WP_TESTS_DIR: /tmp/wordpress-tests-lib
          WP_CORE_DIR: /tmp/wordpress

      - name: Run PHPUnit
        run: vendor/bin/phpunit
        env:
          WP_TESTS_DIR: /tmp/wordpress-tests-lib

  integration-cap:
    name: Integration — Co-Authors Plus
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: byline-feed

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up PHP 8.2
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: '8.2'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, mysql, mysqli, pdo_mysql, bcmath, soap, intl, gd, exif, iconv
          coverage: none

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress

      - name: Install Subversion
        run: sudo apt-get update && sudo apt-get install -y subversion

      - name: Install WordPress test suite
        run: bash bin/install-wp-tests.sh wordpress_test root root 127.0.0.1 latest true
        env:
          WP_TESTS_DIR: /tmp/wordpress-tests-lib
          WP_CORE_DIR: /tmp/wordpress

      - name: Download Co-Authors Plus
        run: |
          curl -sL https://downloads.wordpress.org/plugin/co-authors-plus.latest-stable.zip -o /tmp/cap.zip
          unzip -q /tmp/cap.zip -d /tmp/plugins

      - name: Run PHPUnit with Co-Authors Plus
        run: vendor/bin/phpunit
        env:
          WP_TESTS_DIR: /tmp/wordpress-tests-lib
          BYLINE_CAP_PLUGIN: /tmp/plugins/co-authors-plus/co-authors-plus.php

  integration-ppa:
    name: Integration — PublishPress Authors
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: byline-feed

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up PHP 8.2
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: '8.2'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, mysql, mysqli, pdo_mysql, bcmath, soap, intl, gd, exif, iconv
          coverage: none

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress

      - name: Install Subversion
        run: sudo apt-get update && sudo apt-get install -y subversion

      - name: Install WordPress test suite
        run: bash bin/install-wp-tests.sh wordpress_test root root 127.0.0.1 latest true
        env:
          WP_TESTS_DIR: /tmp/wordpress-tests-lib
          WP_CORE_DIR: /tmp/wordpress

      - name: Download PublishPress Authors
        run: |
          curl -sL https://downloads.wordpress.org/plugin/publishpress-authors.latest-stable.zip -o /tmp/ppa.zip
          unzip -q /tmp/ppa.zip -d /tmp/plugins

      - name: Run PHPUnit with PublishPress Authors
        run: vendor/bin/phpunit
        env:
          WP_TESTS_DIR: /tmp/wordpress-tests-lib
          BYLINE_PPA_PLUGIN: /tmp/plugins/publishpress-authors/publishpress-authors.php

  integration-authorship:
    name: Integration — HM Authorship
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: byline-feed

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up PHP 8.2
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: '8.2'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, mysql, mysqli, pdo_mysql, bcmath, soap, intl, gd, exif, iconv
          coverage: none

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress

      - name: Install Subversion
        run: sudo apt-get update && sudo apt-get install -y subversion

      - name: Install WordPress test suite
        run: bash bin/install-wp-tests.sh wordpress_test root root 127.0.0.1 latest true
        env:
          WP_TESTS_DIR: /tmp/wordpress-tests-lib
          WP_CORE_DIR: /tmp/wordpress

      - name: Clone Human Made Authorship
        run: git clone --depth 1 --branch develop https://github.com/dknauss/authorship.git /tmp/plugins/authorship

      - name: Install Authorship asset-loader dependency
        run: |
          mkdir -p /tmp/plugins/authorship/lib
          git clone --depth 1 https://github.com/humanmade/asset-loader.git /tmp/plugins/authorship/lib/asset-loader

      - name: Run PHPUnit with Human Made Authorship
        run: vendor/bin/phpunit
        env:
          WP_TESTS_DIR: /tmp/wordpress-tests-lib
          BYLINE_HM_PLUGIN: /tmp/plugins/authorship/plugin.php

  integration-activitypub:
    name: Integration — ActivityPub
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: byline-feed

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up PHP 8.2
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: '8.2'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, mysql, mysqli, pdo_mysql, bcmath, soap, intl, gd, exif, iconv
          coverage: none

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress

      - name: Install Subversion
        run: sudo apt-get update && sudo apt-get install -y subversion

      - name: Install WordPress test suite
        run: bash bin/install-wp-tests.sh wordpress_test root root 127.0.0.1 latest true
        env:
          WP_TESTS_DIR: /tmp/wordpress-tests-lib
          WP_CORE_DIR: /tmp/wordpress

      - name: Download ActivityPub
        run: |
          curl -sL https://downloads.wordpress.org/plugin/activitypub.latest-stable.zip -o /tmp/activitypub.zip
          unzip -q /tmp/activitypub.zip -d /tmp/plugins

      - name: Run PHPUnit with ActivityPub
        run: vendor/bin/phpunit
        env:
          WP_TESTS_DIR: /tmp/wordpress-tests-lib
          BYLINE_ACTIVITYPUB_PLUGIN: /tmp/plugins/activitypub/activitypub.php

  phpcs:
    name: PHPCS
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: byline-feed

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: '8.2'
          tools: cs2pr
          coverage: none

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run PHPCS
        run: vendor/bin/phpcs --standard=WordPress --extensions=php --ignore=vendor,node_modules,build,tests --report=checkstyle . | cs2pr

  build:
    name: Node build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: byline-feed

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: byline-feed/package-lock.json

      - name: Install Node dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

  e2e:
    name: E2E — Playwright
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: byline-feed

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: byline-feed/package-lock.json

      - name: Install Node dependencies
        run: npm ci

      - name: Verify Docker is available
        run: docker info > /dev/null 2>&1 || { echo "Docker is not running"; exit 1; }

      - name: Start WordPress environment
        run: npx @wordpress/env start
        timeout-minutes: 5

      - name: Configure WordPress for E2E
        run: bash bin/setup-e2e.sh --skip-start

      - name: Install Playwright browser dependencies
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-artifacts
          path: |
            byline-feed/playwright-report
            byline-feed/test-results
          if-no-files-found: ignore
